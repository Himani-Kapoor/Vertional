<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vertional World</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body { background: linear-gradient(135deg, #090909, #1b1b1b); color: #f5efe0; }
        .card { background: #111; border: 1px solid rgba(210,177,93,0.25); }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4 shadow-lg">
                <h2 class="mb-3 text-warning">Member Login</h2>
                <p class="text-secondary">Sign in to save your favorite watches and receive updates.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-warning w-100">Calculate</button>
                </form>
                {% if result is not None %}
                <div class="alert alert-success mt-3">Result: <strong>{{ result }}</strong></div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
</body>
</html>

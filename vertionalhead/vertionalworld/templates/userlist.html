<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User List | Vertional World</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body { background: #090909; color: #f5efe0; }
    </style>
</head>
<body>
<div class="container py-5">
    <h1 class="mb-4 text-warning">Community members</h1>
    <div class="row g-4">
        {% for user in users|default:'' %}
        <div class="col-md-4">
            <div class="card bg-dark text-light border-secondary">
                <div class="card-body">
                    <h5 class="card-title">{{ user.username }}</h5>
                    <p class="card-text text-secondary">Premium watch enthusiast</p>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12">
            <div class="alert alert-secondary">No community members to display yet.</div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
